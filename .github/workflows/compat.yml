name: SDK Compatibility (latest)

on:
  schedule:
    - cron: "0 9 * * 1" # Monday 9 AM UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  compat-latest:
    name: Test against @upstash/vector@latest
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis/redis-stack-server:latest
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      UPVECTOR_TOKEN: test-token-123
      UPVECTOR_REDIS_URL: redis://localhost:6379
      # The data-embedding compat tests (tests/compatibility/data.test.ts) exercise
      # /upsert-data and /query-data, which require a server-side embedding provider.
      # Use the deterministic "fake" provider so the SDK shape is covered without an
      # external API key. Must stay in sync with the Test workflow (test.yml).
      UPVECTOR_EMBEDDING_PROVIDER: fake
      UPVECTOR_EMBEDDING_MODEL: fake-embedding
      UPVECTOR_EMBEDDING_DIMENSION: 8
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - run: bun install

      - name: Install latest @upstash/vector
        run: bun add -d @upstash/vector@latest

      - name: Capture SDK version
        id: sdk
        run: |
          VERSION=$(bun pm ls 2>/dev/null | grep @upstash/vector | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Testing against @upstash/vector@$VERSION"

      - name: Start up-vector
        run: bun run src/index.ts &

      - name: Wait for server
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080/ && break || sleep 1
          done

      - name: Run compatibility tests
        run: bun test tests/compatibility

      - name: Create issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.sdk.outputs.version }}"
          TITLE="SDK Compat: @upstash/vector@${VERSION} test failures"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          # Ensure the labels exist — gh issue create fails outright if a label is
          # unknown, which would silently swallow the whole notification. Idempotent.
          gh label create sdk-compat --color FBCA04 --description "Upstash SDK compatibility" 2>/dev/null || true
          gh label create automated --color EDEDED --description "Opened by automation" 2>/dev/null || true

          # Skip if an open issue with this exact title already exists (filter by
          # label, exact-match the title — more reliable than free-text search).
          EXISTING=$(gh issue list --state open --label sdk-compat --json number,title \
            --jq ".[] | select(.title == \"$TITLE\") | .number" | head -1)
          if [ -n "$EXISTING" ]; then
            echo "Issue #$EXISTING already open for this version, skipping"
            exit 0
          fi

          gh issue create \
            --title "$TITLE" \
            --label "sdk-compat,automated" \
            --body "Scheduled compatibility tests failed against \`@upstash/vector@${VERSION}\`.

          **Workflow run:** ${RUN_URL}

          This likely means the SDK introduced changes that up-vector doesn't handle yet. Check the workflow logs for failing tests."
